<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists Demo</title>
</head>

<body>

<h1 align="center">HTML Lists</h1>
<hr>

<h2>1. Ordered List (Numbered)</h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<hr>

<h2>2. Unordered List (Bullets)</h2>
<ul>
    <li>Red</li>
    <li>Blue</li>
    <li>Green</li>
</ul>

<hr>

<h2>3. Nested List</h2>
<ol>
    <li>Fruits
        <ul>
            <li>Apple</li>
            <li>Mango</li>
        </ul>
    </li>
    <li>Vegetables
        <ul>
            <li>Carrot</li>
            <li>Potato</li>
        </ul>
    </li>
</ol>

</body>
</html>
