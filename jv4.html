<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <script>

        function validateForm() {

            let name = document.getElementById("name").value;
            let roll = document.getElementById("roll").value;
            let dob = document.getElementById("dob").value;
            let course = document.getElementById("course").value;
            let gender = document.getElementsByName("gender");
            let hobbies = document.getElementsByName("hobby");

            // 1. Roll Number Validation
            if (!/^\d{7}$/.test(roll)) {
                alert("Roll number must be exactly 7 digits");
                return false;
            }

            // 2. Name Validation
            if (!/^[A-Za-z ]+$/.test(name)) {
                alert("Name must contain only alphabets");
                return false;
            }

            // 3. DOB Validation
            if (dob == "") {
                alert("Please enter Date of Birth");
                return false;
            }

            // 4. Course Validation
            if (course == "Select Course") {
                alert("Please select a course");
                return false;
            }

            // 5. Gender Validation
            let genderSelected = false;
            for (let i = 0; i < gender.length; i++) {
                if (gender[i].checked) {
                    genderSelected = true;
                    break;
                }
            }
            if (!genderSelected) {
                alert("Please select gender");
                return false;
            }

            // 6. Hobbies Validation
            let hobbySelected = false;
            for (let i = 0; i < hobbies.length; i++) {
                if (hobbies[i].checked) {
                    hobbySelected = true;
                    break;
                }
            }
            if (!hobbySelected) {
                alert("Please select at least one hobby");
                return false;
            }

            alert("Form submitted successfully");
            return true;
        }

    </script>

</head>

<body bgcolor="#f2f2ff">

<h1 align="center">Student Registration Form</h1>
<hr>

<form onsubmit="return validateForm()">

<h2>1. Text Box</h2>
Name: <input type="text" id="name" placeholder="Enter your name"><br><br>

Roll No: <input type="text" id="roll" placeholder="Enter 7-digit roll number"><br><br>

Date of Birth: <input type="date" id="dob"><br><br>

<hr>

<h2>2. Text Area</h2>
Address:<br>
<textarea rows="4" cols="30" placeholder="Enter your address"></textarea><br><br>

<hr>

<h2>3. Dropdown Box</h2>
Course:
<select id="course">
    <option>Select Course</option>
    <option>BSc</option>
    <option>BCA</option>
    <option>BCom</option>
</select><br><br>

<hr>

<h2>4. Radio Buttons</h2>
Gender:
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>

<hr>

<h2>5. Checkboxes</h2>
Hobbies:
<input type="checkbox" name="hobby"> Reading
<input type="checkbox" name="hobby"> Sports
<input type="checkbox" name="hobby"> Music<br><br>

<hr>

<h2>6. Buttons</h2>
<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
