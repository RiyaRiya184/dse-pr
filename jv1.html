<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>

    <script>
        function showTable() {
            let num = prompt("Enter a number:");

            for (let i = 1; i <= 10; i++) {
                document.write(num + " x " + i + " = " + (num * i) + "<br>");
            }
        }
    </script>

</head>

<body onload="showTable()">

<h1>Multiplication Table</h1>

</body>
</html>
