<!DOCTYPE html>
<html>
<head>
    <title>Images Demo</title>
</head>

<body>

<h1 align="center">Images in HTML</h1>
<hr>

<h2>1. Logo Image</h2>
<img src="logo.png" width="120" alt="Logo">

<hr>

<h2>2. Image inside Table</h2>
<table border="1" cellpadding="10">
<tr>
    <th>Item</th>
    <th>Image</th>
</tr>
<tr>
    <td>Apple</td>
    <td><img src="apple.jpg" width="60" alt="Apple"></td>
</tr>
</table>

<hr>

<h2>3. Clickable Image</h2>
<a href="https://www.google.com">
    <img src="google.png" width="120" alt="Google">
</a>

<hr>

<h2>4. Background Image (Table)</h2>
<table border="1" background="bg.jpg" cellpadding="20">
<tr>
    <td>This table has a background image</td>
</tr>
</table>

</body>
</html>
